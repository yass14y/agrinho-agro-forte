<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 - Forte e Sustentável</title>
    <style>
        /* Reset de estilos básicos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f9f4;
            color: #333;
            line-height: 1.6;
        }

        /* Cabeçalho / Banner Principal */
        header {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.3rem;
            font-weight: 300;
            max-width: 600px;
            margin: 0 auto;
        }

        .badge-2026 {
            background-color: #2e7d32;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        /* Seção Sobre o Tema */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .sobre {
            text-align: center;
            margin-bottom: 50px;
        }

        .sobre h2 {
            color: #1b5e20;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        .sobre p {
            font-size: 1.1rem;
            color: #555;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Pilares da Sustentabilidade (Grid) */
        .pilares {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .pilar-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 5px solid #4caf50;
            transition: transform 0.3s ease;
        }

        .pilar-card:hover {
            transform: translateY(-5s);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .pilar-card h3 {
            color: #2e7d32;
            margin-bottom: 15px;
            font-size: 1.4rem;
        }

        /* Rodapé */
        footer {
            background-color: #1b5e20;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            font-size: 0.9rem;
        }

        /* Responsividade para telas menores */
        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            header p { font-size: 1.1rem; }
            .sobre h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <span class="badge-2026">Projeto Agrinho 2026</span>
        <h1>Agrinho Forte e Sustentável</h1>
        <p>Cultivando o futuro com inovação, respeito à natureza e a força do nosso campo.</p>
    </header>
